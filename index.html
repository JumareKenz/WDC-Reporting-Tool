<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#1F4438" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1F4438" media="(prefers-color-scheme: dark)" />
    <meta name="color-scheme" content="light" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <title>Kaduna WDC Digital Reporting System</title>
    <style>
      /* ── Animated splash overlay ────────────────────────────────────────────
         Shown immediately on page load — visible while React boots up.
         The useAuth hook removes #app-splash via the 'wdc:auth-ready' event. */
      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at 30% 20%, #2A6048 0%, #1F4438 55%, #14302A 100%);
        opacity: 1;
        transition: opacity 600ms ease-out, visibility 600ms ease-out;
      }
      #app-splash.hide {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      /* Pulsing glow ring behind the logo */
      #app-splash::before {
        content: '';
        position: absolute;
        width: 280px;
        height: 280px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(201, 166, 107, 0.25) 0%, transparent 70%);
        animation: splash-pulse 2.2s ease-in-out infinite;
      }
      @keyframes splash-pulse {
        0%, 100% { transform: scale(0.9); opacity: 0.45; }
        50%      { transform: scale(1.15); opacity: 0.85; }
      }

      /* Logo container — entrance animation */
      #app-splash .splash-logo-wrap {
        position: relative;
        width: 160px;
        height: 160px;
        border-radius: 36px;
        overflow: hidden;
        box-shadow:
          0 24px 80px rgba(0, 0, 0, 0.45),
          0 0 0 1px rgba(255, 255, 255, 0.08);
        animation: splash-logo-in 900ms cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      #app-splash .splash-logo-wrap img {
        width: 100%;
        height: 100%;
        display: block;
      }
      @keyframes splash-logo-in {
        from { transform: scale(0.6) translateY(20px); opacity: 0; }
        to   { transform: scale(1)   translateY(0);    opacity: 1; }
      }

      /* Shine overlay sweeping across the logo */
      #app-splash .splash-logo-wrap::after {
        content: '';
        position: absolute;
        top: 0; left: -100%;
        width: 60%;
        height: 100%;
        background: linear-gradient(
          110deg,
          transparent 0%,
          rgba(255, 255, 255, 0.18) 50%,
          transparent 100%
        );
        animation: splash-shine 2.6s 0.4s ease-in-out infinite;
      }
      @keyframes splash-shine {
        0%   { left: -100%; }
        70%  { left: 130%; }
        100% { left: 130%; }
      }

      /* Title text */
      #app-splash .splash-title {
        margin-top: 36px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-weight: 700;
        letter-spacing: 0.05em;
        font-size: 18px;
        color: #F5EDDD;
        animation: splash-fade-up 800ms 200ms cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      #app-splash .splash-sub {
        margin-top: 6px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 12px;
        color: rgba(245, 237, 221, 0.6);
        animation: splash-fade-up 800ms 350ms cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      @keyframes splash-fade-up {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* Loading dots */
      #app-splash .splash-dots {
        margin-top: 32px;
        display: flex;
        gap: 8px;
        animation: splash-fade-up 800ms 500ms cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      #app-splash .splash-dots span {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #C9A66B;
        animation: splash-bounce 1.2s ease-in-out infinite;
      }
      #app-splash .splash-dots span:nth-child(2) { animation-delay: 0.15s; }
      #app-splash .splash-dots span:nth-child(3) { animation-delay: 0.30s; }
      @keyframes splash-bounce {
        0%, 80%, 100% { transform: translateY(0);    opacity: 0.4; }
        40%           { transform: translateY(-8px); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="app-splash" aria-hidden="true">
      <div class="splash-logo-wrap">
        <img src="/app-icon.png" alt="" />
      </div>
      <div class="splash-title">KADUNA STATE WDC</div>
      <div class="splash-sub">Digital Reporting System</div>
      <div class="splash-dots"><span></span><span></span><span></span></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
